name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Migration metadata check
        run: bun run migrate:check

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit + integration tests
        run: bun run test

      - name: Database integration tests
        run: bun run test:db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RUN_DB_TESTS: ${{ secrets.RUN_DB_TESTS }}

  evals:
    name: LLM evals
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Eval tests
        run: bun run test:evals
